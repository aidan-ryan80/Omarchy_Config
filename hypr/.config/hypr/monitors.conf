# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale
# You must relaunch Hyprland after changing any envs (use Super+Esc, then Relaunch)

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
# env = GDK_SCALE,2
# monitor=,preferred,auto,auto

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.666667

# Straight 1x setup for low-resolution displays like 1080p or 1440p
 env = GDK_SCALE,1
 monitor=eDP-1,1920x1080@60,0x0,1.33334

# Acer monitor
 monitor=desc:Acer Technologies B246HL LYDEE0108511,1920x1080@60,-1920x0,1

# HP monitor
 monitor=desc:Hewlett Packard HP E240c 3CQ7061KCJ,1920x1080@60,-3840x0,1

# Samsung Hotel Monitor:
# monitor=HDMI-A-1,3840x2160@60,1920x0,1.5
# monitor=HDMI-A-1,1920x1080@60,1920x0,1

# Samsung (Starts exactly where the laptop's LOGICAL width ends)
# 1920 / 1.33334 = 1440
# monitor=HDMI-A-1,3840x2160@60,1440x0,1.5

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2

# --- Edited workspace assignment for while using samsung monitor. Change it back later ---
workspace = 1,monitor:eDP-1,default:true,persistent:true
workspace = 2,monitor:eDP-1,persistent:true
# workspace = 4,monitor:eDP-1,persistent:true
# workspace = 7,monitor:eDP-1,persistent:true

# workspace = 2,monitor:desc:Acer Technologies B246HL LYDEE0108511,default:true,persistent:true
# workspace = 5,monitor:desc:Acer Technologies B246HL LYDEE0108511,persistent:true
# workspace = 8,monitor:desc:Acer Technologies B246HL LYDEE0108511,persistent:true
# workspace = 3,monitor:desc:Hewlett Packard HP E240c 3CQ7061KCJ,default:true,persistent:true
# workspace = 6,monitor:desc:Hewlett Packard HP E240c 3CQ7061KCJ,persistent:true
# workspace = 9,monitor:desc:Hewlett Packard HP E240c 3CQ7061KCJ,persistent:true

source = ~/.config/hypr/samsung.conf
