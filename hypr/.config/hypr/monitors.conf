# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors: hyprctl monitors
# Format: monitor = [port|desc:EDID], resolution|preferred, position, scale
#
# Physical layout (left to right): HP Monitor | Acer Monitor | Laptop
# Laptop + Acer bottoms aligned; laptop sits higher due to shorter logical height.
# To switch machines: comment out the active block and uncomment the other.

# -- MACHINE: Acer PHN16 -------------------------------------------------------
# Laptop logical size: 2560/1.60 = 1600w × 1600/1.60 = 1000h
# Acer logical size: 1920w × 1080h — 80px taller, so laptop sits at y=80
monitor = desc:Hewlett Packard HP E240c,   preferred, 0x0,    1
monitor = desc:Acer Technologies B246HL,   preferred, 1920x0, 1
monitor = desc:AU Optronics B160QAN03.Y,   2560x1600@240, 3840x80, 1.60
workspace = 1, monitor:desc:AU Optronics B160QAN03.Y, persistent:true
workspace = 4, monitor:desc:AU Optronics B160QAN03.Y, persistent:true
workspace = 7, monitor:desc:AU Optronics B160QAN03.Y, persistent:true

# -- MACHINE: Old Laptop --------------------------------------------------------
# Laptop logical size: 1920/1.33334 = 1440w × 1080/1.33334 = 810h
# Acer logical size: 1920w × 1080h — 270px taller, so laptop sits at y=270
# monitor = desc:Hewlett Packard HP E240c,   preferred, 0x0,    1
# monitor = desc:Acer Technologies B246HL,   preferred, 1920x0, 1
# monitor = desc:BOE 0x08C2,                 1920x1080@60, 3840x270, 1.33334
# workspace = 1, monitor:desc:BOE 0x08C2, persistent:true
# workspace = 4, monitor:desc:BOE 0x08C2, persistent:true
# workspace = 7, monitor:desc:BOE 0x08C2, persistent:true

# -- Shared workspace assignments (external monitors) --------------------------
workspace = 2, monitor:desc:Acer Technologies B246HL
workspace = 5, monitor:desc:Acer Technologies B246HL
workspace = 8, monitor:desc:Acer Technologies B246HL
workspace = 3, monitor:desc:Hewlett Packard HP E240c
workspace = 6, monitor:desc:Hewlett Packard HP E240c
workspace = 9, monitor:desc:Hewlett Packard HP E240c

# -- Fallback for any other connected monitor ----------------------------------
monitor = , preferred, auto, 1
